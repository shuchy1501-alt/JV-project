<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <script>
    let fnum = prompt("Enter a number:");

let result = 1;

for(let i = 1; i <= fnum; i++){
    result *= i;
}

console.log(result);
document.write("Factorial = " + result);
   </script> 
</body>
</html>
