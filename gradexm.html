<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    

        let result=Number(prompt("Enter Your Number"));
        if(result>=80){
            console.log("A+");
        }
        else if(result>=70){
           console.log("A"); 
        }
        else if(result>=60){
            console.log("B");
        }
        else{
            console.log("Fail");
        }
        document.write("Grade= " + result);
    </script>
</body>
</html>
