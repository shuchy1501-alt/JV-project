<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Prime Number</h1>
    <label for="number">Enter a number</label><br>
    <input type="number" id="number"><br><br>
    <button class="btn" onclick="abc()">Submit</button>
    <h1 id="result"></h1>
    <script>
        function abc(){
            let inputValue=document.querySelector("#number").value;
            alert(inputValue)
            let output=document.querySelector("#result");
            function isPrime(number){
                if(number<2){return false};
                for(let i=2;i<number;i++){
                    if(number%i==0){
                        return false
                    }
                }return true;
            }
            output.innerText=isPrime(inputValue) ?`${(inputValue)} is a prime number `: `${(inputValue)} is a not prime number`
            
        }
    </script>
</body>
</html>
